<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parade Beams Central</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
  body { background: black; color: white; min-height: 100vh; overflow-x: hidden; }

  /* Star background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 15% 25%, #fff, transparent),
      radial-gradient(1px 1px at 80% 15%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 50% 70%, #fff, transparent),
      radial-gradient(1px 1px at 10% 80%, #fff, transparent),
      radial-gradient(2px 2px at 90% 60%, #fff, transparent);
    opacity: 0.3;
    z-index: -1;
    animation: stars 20s linear infinite;
  }

  @keyframes stars { from { transform: translateY(0); } to { transform: translateY(-200px); } }

  .container { text-align: center; padding: 80px 20px; }

  .badge {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 30px;
    background: rgba(255,0,0,0.15);
    border: 1px solid red;
    color: #ff4d4d;
    margin-bottom: 30px;
    font-weight: bold;
  }

  h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
  h1 span { color: red; }

  p { color: #ccc; max-width: 600px; margin: 20px auto 40px; line-height: 1.6; }

  .buttons { display: flex; flex-direction: column; gap: 20px; max-width: 300px; margin: 0 auto; }

  a.button {
    text-decoration: none;
    padding: 15px;
    border-radius: 10px;
    font-weight: bold;
    display: block;
    transition: 0.3s ease;
    text-align: center;
  }

  .primary {
    background: red;
    color: white;
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
  }

  .primary:hover { background: #ff3333; box-shadow: 0 0 30px rgba(255,0,0,0.9); }

  .discord {
    background: #7289da;
    color: white;
    box-shadow: 0 0 10px #7289da;
    animation: glow 2s infinite alternate;
  }

  .discord:hover { box-shadow: 0 0 25px #7289da; }

  @keyframes glow {
    from { box-shadow: 0 0 10px #7289da; transform: scale(1); }
    to { box-shadow: 0 0 25px #7289da; transform: scale(1.05); }
  }

  footer { margin-top: 80px; color: #555; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="container">
  <div class="badge">#1 BEAMING TEAM</div>

  <h1>PARADE BEAMS <span>CENTRAL</span></h1>

  <p>Competitive gaming hub focused on Fortnite, rivals, and elite-level beams. Join the movement and show real aim.</p>

  <div class="buttons">
    <a class="button primary" href="https://www.logged.tg/auth/parade" target="_blank">Visit Site</a>

    <a class="button discord" href="https://discord.gg/3nTASvT4qu" target="_blank">Join Discord</a>
  </div>

  <footer>© 2026 Parade Beams</footer>
</div>

</body>
</html>
